<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GD3DS — Baixando...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #e0e0f0;
    }

    .card {
      text-align: center;
      padding: 48px 40px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      max-width: 400px;
      width: 90%;
    }

    .icon {
      font-size: 52px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .sub {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    .filename {
      display: inline-block;
      background: #0d0d1f;
      border: 1px solid #333360;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: monospace;
      font-size: 13px;
      color: #a0a0ff;
      margin-bottom: 28px;
    }

    .bar-wrap {
      width: 100%;
      height: 4px;
      background: #2a2a4a;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c5cbf, #5b8dd9);
      border-radius: 2px;
      animation: fill 2s ease forwards;
    }

    @keyframes fill {
      to { width: 100%; }
    }

    .status {
      font-size: 13px;
      color: #666;
    }

    .manual {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
    }

    .manual a {
      color: #7c5cbf;
      text-decoration: none;
    }

    .manual a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎮</div>
    <h1>GD3DS</h1>
    <p class="sub">Geometry Dash para Nintendo 3DS</p>
    <div class="filename" id="fname">carregando...</div>
    <div class="bar-wrap"><div class="bar"></div></div>
    <p class="status" id="status">Redirecionando para o download...</p>
    <p class="manual" id="manual"></p>
  </div>

  <script>
    fetch("redirect.json?nocache=" + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById("fname").textContent = data.filename || "gd3ds.cia";
        document.getElementById("manual").innerHTML =
          'Link direto: <a href="' + data.url + '">' + data.url + '</a>';
        setTimeout(() => {
          window.location.href = data.url;
        }, 2000);
      })
      .catch(() => {
        document.getElementById("status").textContent = "Erro ao carregar. Tente o link manual.";
        document.getElementById("fname").textContent = "redirect.json não encontrado";
      });
  </script>
</body>
</html>
