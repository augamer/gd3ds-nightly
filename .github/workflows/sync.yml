name: Auto Update GD3DS

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Limpar arquivos (SEM quebrar git)
        run: find . -mindepth 1 -not -path "./.git*" -delete

      - name: Baixar ZIP
        run: |
          curl -L https://nightly.link/AleFunky/gd3ds/workflows/main/master/gd3ds-cia.zip -o file.zip

      - name: Extrair
        run: unzip file.zip -d temp

      - name: Pegar CIA
        run: |
          FILE=$(find temp -name "*.cia" | head -n 1)
          cp "$FILE" gd3ds.cia

      - name: Criar redirect fixo
        run: |
          echo '<meta http-equiv="refresh" content="0; url=gd3ds.cia">' > index.html

      - name: Gerar QR Code FIXO
        run: |
          LINK="https://augamer.github.io/gd3ds-qr/"
          curl "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=$LINK" -o qr.png

      - name: Commit e push
        run: |
          git config --global user.email "bot@bot.com"
          git config --global user.name "bot"
          git add .
          git commit -m "update automatico" || echo "sem mudanças"
          git push
